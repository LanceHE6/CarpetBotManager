name: Build & Release (Multi-Branch)

on:
  push:
    tags:
      - 'V*'
      - 'v*'
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - single
      branch:
        description: '单分支构建时填写分支名'
        required: false
        default: ''

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      branches: ${{ steps.filter_branches.outputs.branches }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 获取并过滤分支列表
        id: filter_branches
        run: |
          # 获取所有远程分支
          ALL_BRANCHES=$(git branch -r | grep -v '\->' | sed 's/origin\///' | sort -u)

          BUILD_TYPE="${{ github.event.inputs.build_type }}"
          SINGLE_BRANCH="${{ github.event.inputs.branch }}"
          EVENT_NAME="${{ github.event_name }}"

          # 处理构建类型过滤
          if [ "$EVENT_NAME" == "push" ] || [ "$BUILD_TYPE" == "all" ]; then
            # 推送事件或全量构建：构建所有分支
            FILTERED_BRANCHES="$ALL_BRANCHES"
          elif [ "$BUILD_TYPE" == "single" ]; then
            # 单分支构建：验证分支存在后只构建该分支
            if echo "$ALL_BRANCHES" | grep -qw "$SINGLE_BRANCH"; then
              FILTERED_BRANCHES="$SINGLE_BRANCH"
              echo "单分支构建模式：$SINGLE_BRANCH"
            else
              echo "错误：分支 '$SINGLE_BRANCH' 不存在"
              echo "可用分支：$(echo $ALL_BRANCHES | tr '\n' ' ')"
              exit 1
            fi
          else
            echo "未知构建类型：$BUILD_TYPE"
            exit 1
          fi

          # 转换为 JSON 数组
          JSON=$(echo "$FILTERED_BRANCHES" | jq -R . | jq -cs .)
          echo "branches=$JSON" >> $GITHUB_OUTPUT
          echo "将要构建的分支：$FILTERED_BRANCHES"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      matrix:
        branch: ${{ fromJson(needs.prepare.outputs.branches) }}
      fail-fast: false
    steps:
      - name: Checkout 分支 ${{ matrix.branch }}
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          fetch-depth: 1

      - name: 读取项目 Java 版本
        id: java_version
        run: |
          JAVA_VER=$(grep -oP 'sourceCompatibility\s*=\s*JavaVersion\.VERSION_\K\d+' build.gradle)
          if [ -z "$JAVA_VER" ]; then
            JAVA_VER=$(grep -oP 'it\.options\.release\s*=\s*\K\d+' build.gradle)
          fi
          if [ -z "$JAVA_VER" ]; then
            JAVA_VER=$(grep -oP 'def\s+targetJavaVersion\s*=\s*\K\d+' build.gradle)
          fi
          echo "version=$JAVA_VER" >> $GITHUB_OUTPUT
          echo "检测到项目需要 JDK $JAVA_VER"

      - name: Set up JDK ${{ steps.java_version.outputs.version }}
        uses: actions/setup-java@v4
        with:
          java-version: '${{ steps.java_version.outputs.version }}'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build with Gradle
        run: gradle build --no-daemon

      - name: 读取版本号
        id: version
        run: |
          MOD_VER=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          MC_VER=$(grep '^minecraft_version=' gradle.properties | cut -d'=' -f2)
          MOD_NAME=$(grep '^archives_base_name=' gradle.properties | cut -d'=' -f2)
          echo "MOD_VERSION=$MOD_VER" >> $GITHUB_ENV
          echo "MC_VERSION=$MC_VER" >> $GITHUB_ENV
          echo "MOD_NAME=$MOD_NAME" >> $GITHUB_ENV
          echo "mod_version=$MOD_VER" >> $GITHUB_OUTPUT
          echo "mc_version=$MC_VER" >> $GITHUB_OUTPUT
          echo "mod_name=$MOD_NAME" >> $GITHUB_OUTPUT

      - name: 重命名 JAR
        run: |
          cd build/libs
          rm -f *-sources.jar
          mv *.jar ${{ steps.version.outputs.mod_name }}-mc${{ steps.version.outputs.mc_version }}-${{ steps.version.outputs.mod_version }}.jar

      - name: 上传构建产物 (${{ matrix.branch }})
        uses: actions/upload-artifact@v4
        with:
          name: jars-${{ matrix.branch }}
          path: build/libs/${{ steps.version.outputs.mod_name }}-mc${{ steps.version.outputs.mc_version }}-${{ steps.version.outputs.mod_version }}.jar

  release:
    needs: build
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: ./outputs/
          pattern: jars-*
          merge-multiple: true

      - name: 获取模组版本
        id: get_mod_ver
        run: |
          MOD_VER=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          echo "MOD_VERSION=$MOD_VER" >> $GITHUB_ENV
          echo "mod_version=$MOD_VER" >> $GITHUB_OUTPUT

      - name: 安装 git-cliff
        run: |
          curl -sSfL https://github.com/orhun/git-cliff/releases/download/v2.7.0/git-cliff-2.7.0-x86_64-unknown-linux-gnu.tar.gz | tar xz
          sudo mv git-cliff-*/git-cliff /usr/local/bin/

      - name: 生成更新日志
        id: changelog
        run: |
          git-cliff --tag V${{ env.MOD_VERSION }} -o CHANGELOG_BODY.md
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat CHANGELOG_BODY.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: V${{ env.MOD_VERSION }}
          tag_name: V${{ env.MOD_VERSION }}
          body: ${{ steps.changelog.outputs.changelog }}
          files: ./outputs/*.jar
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
