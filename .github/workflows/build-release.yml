name: Build & Release (Multi-Version)

on:
  push:
    tags:
      - 'V*'
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build all versions
        run: ./gradlew buildAll --no-daemon

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jars
          path: dist/*.jar

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: jars
          path: ./outputs/

      - name: Get mod version
        id: get_mod_ver
        run: |
          MOD_VER=$(grep '^mod_version=' gradle.properties | cut -d'=' -f2)
          echo "MOD_VERSION=$MOD_VER" >> $GITHUB_ENV
          echo "mod_version=$MOD_VER" >> $GITHUB_OUTPUT

      - name: Generate changelog
        uses: orhun/git-cliff-action@v3
        with:
          config: cliff.toml
          args: --verbose
        env:
          OUTPUT: CHANGELOG_BODY.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: V${{ env.MOD_VERSION }}
          tag_name: V${{ env.MOD_VERSION }}
          body_path: CHANGELOG_BODY.md
          files: ./outputs/*.jar
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
